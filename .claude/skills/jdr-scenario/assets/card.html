<!-- Carte de scénario pour la page d'accueil (index.html à la racine du repo).
     À insérer juste avant le marqueur <!-- SCENARIOS:END -->.
     href pointe vers le dossier du scénario : scenarios/<slug>/ -->
<a class="card" href="scenarios/{{SLUG}}/">
  <!-- Vignette (optionnelle) : place cover.png dans scenarios/<slug>/ ; sinon supprime cette ligne.
       La règle CSS .card-cover est déjà dans index.html. -->
  <img class="card-cover" src="scenarios/{{SLUG}}/cover.png" alt="">
  <span class="card-eyebrow">{{GENRE}} · {{FORMAT}}</span>
  <h2 class="card-title">{{TITRE}}</h2>
  <p class="card-lead">{{ACCROCHE}}</p>
  <div class="card-meta">
    <span>{{DUREE}}</span>
    <span>{{NB_PJ}}</span>
    <span>{{THEMES}}</span>
  </div>
  <span class="card-go">Ouvrir le scénario →</span>
</a>
